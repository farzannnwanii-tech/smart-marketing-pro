<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART AI-NODE | Autonomous AI Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background: #050505; color: #e5e7eb; font-family: 'Inter', sans-serif; overflow: hidden; }
        #node-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.3; }
        .chat-container { height: calc(100vh - 180px); scrollbar-width: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        .glass-header { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .input-bar { background: rgba(15, 15, 15, 0.95); border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .ai-msg { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); }
        .user-msg { background: rgba(37, 99, 235, 0.2); border: 1px solid rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>

    <canvas id="node-bg"></canvas>

    <!-- Header with Dynamic Model Selector -->
    <header class="glass-header fixed top-0 w-full z-50 p-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <span class="text-blue-500 font-black text-xl tracking-tighter">AI-NODE</span>
            <span class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded-full font-bold uppercase">Auto-Sync</span>
        </div>
        
        <!-- THE DYNAMIC ARROW BUTTON -->
        <div class="relative group">
            <select id="modelSelect" class="bg-black border border-white/20 text-white text-[10px] font-bold py-2 pl-4 pr-10 rounded-full outline-none focus:border-blue-500 cursor-pointer uppercase tracking-widest">
                <option>FETCHING MODELS...</option>
            </select>
            <i class="fas fa-chevron-down absolute right-4 top-3 text-[10px] pointer-events-none text-blue-500"></i>
        </div>
    </header>

    <!-- Chat Interface -->
    <main id="chatBox" class="chat-container mt-20 p-4 md:p-8 flex flex-col space-y-6 overflow-y-auto w-full max-w-4xl mx-auto">
        <div class="ai-msg p-5 rounded-3xl max-w-[90%] text-sm leading-relaxed border-l-4 border-blue-600">
            <strong>System:</strong> Node Intelligence initialized. Models are being synchronized from global servers. No API required. 
        </div>
    </main>

    <!-- Professional Input Bar -->
    <div class="input-bar fixed bottom-0 w-full p-4 md:p-6">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input type="text" id="userInput" placeholder="Ask anything to the Node..." class="flex-1 bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500 text-sm transition-all">
            <button onclick="send()" class="bg-blue-600 px-8 py-4 rounded-2xl text-black font-black hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <p class="text-[9px] text-center mt-3 opacity-30 tracking-[0.5em] uppercase">Autonomous AI Hub • 100% Secure • India 🇮🇳</p>
    </div>

    <script>
        // --- 1. DYNAMIC MODEL DISCOVERY (The "Bawal" Node Logic) ---
        async function fetchModels() {
            const select = document.getElementById('modelSelect');
            try {
                // Fetching real-time models list from the global node
                const res = await fetch('https://text.pollinations.ai/models');
                const models = await res.json();
                
                select.innerHTML = ""; // Clear fetching text
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.name;
                    opt.innerText = `${m.name.toUpperCase()} (ACTIVE)`;
                    select.appendChild(opt);
                });

                // Add Image Nodes manually since they are different
                const imgOpt = document.createElement('option');
                imgOpt.value = "flux"; imgOpt.innerText = "FLUX PRO (IMAGE)";
                select.appendChild(imgOpt);

            } catch (e) {
                select.innerHTML = "<option>ERROR SYNCING MODELS</option>";
            }
        }
        fetchModels(); // Run on startup

        // --- 2. WORKING CHAT EXECUTION ---
        async function send() {
            const input = document.getElementById('userInput').value;
            const model = document.getElementById('modelSelect').value;
            const chatBox = document.getElementById('chatBox');
            if(!input) return;

            // Append User Message
            appendMsg('user', input);
            document.getElementById('userInput').value = '';

            // AI Processing Bubble
            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg p-5 rounded-3xl max-w-[90%] text-sm border-l-4 border-gray-600 animate-pulse';
            aiDiv.innerText = `${model} is processing...`;
            chatBox.appendChild(aiDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                if(model === 'flux') {
                    const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(input)}?width=1080&height=1080&nologo=true`;
                    aiDiv.innerHTML = `<img src="${imgUrl}" class="rounded-2xl border border-white/10 max-w-full" alt="AI ART">`;
                } else {
                    const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(input)}?model=${model}`);
                    const text = await res.text();
                    aiDiv.classList.remove('animate-pulse');
                    aiDiv.innerHTML = `<strong>${model.toUpperCase()}:</strong> <br>${text}`;
                }
            } catch (e) {
                aiDiv.innerText = "Error: Node Timeout. Try another model.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function appendMsg(sender, text) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'user-msg p-5 rounded-3xl max-w-[85%] text-sm ml-auto font-bold' : 'ai-msg p-5 rounded-3xl max-w-[90%] text-sm border-l-4 border-blue-600';
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- BAWAL NODE BACKGROUND ---
        const canvas = document.getElementById('node-bg');
        const ctx = canvas.getContext('2d');
        let parts = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        class Part {
            constructor() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.sx = Math.random()*0.4 - 0.2; this.sy = Math.random()*0.4 - 0.2;
            }
            draw() {
                this.x += this.sx; this.y += this.sy;
                if(this.x<0 || this.x>canvas.width) this.sx*=-1;
                if(this.y<0 || this.y>canvas.height) this.sy*=-1;
                ctx.fillStyle = 'rgba(37, 99, 235, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1, 0, Math.PI*2); ctx.fill();
            }
        }
        for(let i=0; i<60; i++) parts.push(new Part());
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            parts.forEach((p,i) => {
                p.draw();
                for(let j=i; j<parts.length; j++) {
                    let d = Math.hypot(p.x-parts[j].x, p.y-parts[j].y);
                    if(d<100) {
                        ctx.strokeStyle = `rgba(37, 99, 235, ${0.15 - d/700})`;
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(parts[j].x,parts[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(anim);
        }
        anim();

        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>

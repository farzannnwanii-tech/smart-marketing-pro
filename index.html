<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ARENA PRO | World's #1 Model Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        
        /* Model Selection Drawer - EXACT REPLICA */
        #arena-drawer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; backdrop-filter: blur(8px); }
        .drawer-main { position: absolute; bottom: 0; width: 100%; height: 85%; background: #121212; border-top: 1px solid #333; border-radius: 24px 24px 0 0; display: flex; flex-direction: column; }
        .drawer-header { padding: 16px; border-bottom: 1px solid #222; }
        .search-bar { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; padding: 12px; width: 100%; color: #fff; outline: none; }
        
        .tabs { display: flex; gap: 8px; padding: 12px; overflow-x: auto; border-bottom: 1px solid #222; }
        .tab { padding: 8px 16px; background: #1e1e1e; border-radius: 8px; font-size: 13px; font-weight: 600; color: #aaa; cursor: pointer; display: flex; items-center: center; gap: 6px; }
        .tab.active { background: #333; color: #fff; }

        .model-list { flex: 1; overflow-y: auto; padding: 10px; }
        .model-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
        .model-row:hover { background: #1a1a1a; }
        .brand-logo { width: 22px; height: 22px; margin-right: 12px; border-radius: 4px; }
        .model-info { display: flex; align-items: center; }
        .model-name { font-size: 14px; font-weight: 500; color: #ddd; }
        .model-name.active { color: #4ade80; }

        /* Professional Chat Area */
        .chat-view { height: calc(100vh - 160px); overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 30px; }
        .label { font-size: 11px; font-weight: 800; color: #666; text-transform: uppercase; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .content { font-size: 15px; line-height: 1.7; color: #ccc; max-width: 95%; }
        
        .input-panel { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #222; padding: 16px; }
        .input-container { max-width: 800px; margin: 0 auto; display: flex; gap: 12px; background: #111; border: 1px solid #333; border-radius: 16px; padding: 8px 16px; }
        #userInput { flex: 1; background: transparent; border: none; outline: none; color: #fff; padding: 12px 0; font-size: 15px; }
    </style>
</head>
<body>

    <!-- Main Header -->
    <header class="p-4 border-b border-[#222] flex justify-between items-center bg-black/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2" onclick="location.reload()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" class="w-5 h-5">
            <span id="header-model-name" class="font-bold text-sm text-gray-400">gemini-3-flash</span>
            <i class="fas fa-chevron-down text-[10px] text-gray-600 ml-1" onclick="openArena()"></i>
        </div>
        <div class="flex gap-4 text-gray-400 text-sm">
            <i class="fas fa-comment-alt"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <!-- THE ASLI ARENA DRAWER -->
    <div id="arena-drawer">
        <div class="drawer-main">
            <div class="drawer-header">
                <input type="text" class="search-bar" placeholder="Search models">
            </div>
            <div class="tabs">
                <div class="tab active"><i class="fas fa-font"></i> Text</div>
                <div class="tab"><i class="fas fa-code"></i> Code</div>
                <div class="tab"><i class="fas fa-image"></i> Image</div>
                <div class="tab"><i class="fas fa-globe"></i> Search</div>
            </div>
            <div class="p-4 text-[11px] font-bold text-gray-500 uppercase tracking-widest">Top Text Models</div>
            <div class="model-list" id="models-container">
                <!-- Data will inject here -->
            </div>
        </div>
    </div>

    <!-- Chat Display -->
    <main id="chat-box" class="chat-view max-w-3xl mx-auto">
        <div class="message">
            <span class="label"><img id="sys-logo" src="https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" class="w-3 h-3"> gemini-3-flash</span>
            <div class="content">Systems online. All nodes synchronized. How can I assist you today?</div>
        </div>
    </main>

    <!-- Input Control -->
    <div class="input-panel">
        <div class="input-container">
            <input type="text" id="userInput" placeholder="Message...">
            <button onclick="send()" class="text-gray-400 hover:text-white transition"><i class="fas fa-arrow-up text-xl"></i></button>
        </div>
    </div>

    <script>
        let currentModel = "gemini";
        let currentLabel = "gemini-3-flash";
        let currentLogo = "https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg";

        const models = [
            { id: "openai", name: "gpt-5.2-chat-latest", logo: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" },
            { id: "gemini", name: "gemini-3-pro", logo: "https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" },
            { id: "gemini", name: "gemini-3-flash", logo: "https://upload.wikimedia.org/wikipedia/commons/8/8a/Google_Gemini_logo.svg" },
            { id: "openai", name: "gpt-5-high", logo: "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" },
            { id: "xai", name: "grok-4-1-fast-reasoning", logo: "https://upload.wikimedia.org/wikipedia/commons/5/57/X_logo_2023_%28white%29.png" },
            { id: "qwen", name: "qwen3-v1-max", logo: "https://upload.wikimedia.org/wikipedia/commons/a/a7/Alibaba_Group_logo.svg" },
            { id: "mistral", name: "mistral-small-2506", logo: "https://avatars.githubusercontent.com/u/144473551?s=200&v=4" },
            { id: "amazon", name: "amazon.nova-pro-v1", logo: "https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" }
        ];

        function openArena() { document.getElementById('arena-drawer').style.display = 'block'; }
        function closeArena() { document.getElementById('arena-drawer').style.display = 'none'; }

        function loadModels() {
            const container = document.getElementById('models-container');
            container.innerHTML = "";
            models.forEach(m => {
                const row = document.createElement('div');
                row.className = "model-row";
                row.innerHTML = `
                    <div class="model-info">
                        <img src="${m.logo}" class="brand-logo">
                        <span class="model-name ${m.name === currentLabel ? 'active' : ''}">${m.name}</span>
                        ${m.name === currentLabel ? '<i class="fas fa-check text-green-500 ml-2 text-[10px]"></i>' : ''}
                    </div>
                    <div class="flex gap-3 text-gray-700">
                        <i class="fas fa-glasses"></i>
                        <i class="fas fa-file-alt"></i>
                    </div>
                `;
                row.onclick = () => {
                    currentModel = m.id;
                    currentLabel = m.name;
                    currentLogo = m.logo;
                    document.getElementById('header-model-name').innerText = m.name;
                    closeArena();
                };
                container.appendChild(row);
            });
        }

        async function send() {
            const inp = document.getElementById('userInput');
            const chat = document.getElementById('chat-box');
            if (!inp.value) return;

            const val = inp.value;
            inp.value = "";
            appendMsg('Direct', val, "https://cdn-icons-png.flaticon.com/512/1144/1144760.png");

            const aiMsg = appendMsg(currentLabel, "Thinking...", currentLogo);

            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(val)}?model=${currentModel}`);
                const text = await res.text();
                aiMsg.innerText = text;
            } catch (e) { aiMsg.innerText = "Connection lost. Node error."; }
            chat.scrollTop = chat.scrollHeight;
        }

        function appendMsg(sender, text, logo) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="label"><img src="${logo}" class="w-3 h-3"> ${sender}</span><div class="content">${text}</div>`;
            document.getElementById('chat-box').appendChild(div);
            return div.querySelector('.content');
        }

        loadModels();
        window.onclick = (e) => { if(e.target.id === 'arena-drawer') closeArena(); }
        document.getElementById('userInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
    </html>

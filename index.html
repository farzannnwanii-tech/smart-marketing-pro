<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART MARKETING PRO | Global Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-glow { text-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        .btn-grad { background: linear-gradient(90deg, #1d4ed8, #7c3aed); }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Header -->
    <div class="text-center mb-16">
        <h1 class="text-5xl md:text-7xl font-black neon-glow mb-4">SMART <span class="text-blue-500">PRO</span></h1>
        <p class="text-gray-500 tracking-widest uppercase text-xs font-bold">India's Premium Creator Suite • No Login Required</p>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-10">
        
        <!-- URL SHORTENER -->
        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <h2 class="text-2xl font-bold mb-6 text-blue-400"><i class="fas fa-link mr-2"></i> URL Shortener</h2>
            <input type="text" id="longUrl" placeholder="Paste long link..." class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-4 outline-none focus:border-blue-500">
            <input type="text" id="alias" placeholder="Custom name (Optional)" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-6 outline-none">
            <button onclick="shorten()" class="w-full py-4 btn-grad rounded-xl font-bold hover:scale-105 transition">CREATE SHORT LINK 🚀</button>
            <div id="urlResult" class="mt-6 hidden p-4 bg-blue-600/20 border border-blue-500/30 rounded-xl">
                <p id="finalUrl" class="text-sm break-all font-mono"></p>
                <button onclick="copy()" class="mt-2 text-xs bg-white/10 px-4 py-2 rounded-lg">Copy Link</button>
            </div>
        </div>

        <!-- QR MASTER -->
        <div class="glass p-8 rounded-[2rem] shadow-2xl text-center">
            <h2 class="text-2xl font-bold mb-6 text-green-400"><i class="fas fa-qrcode mr-2"></i> QR Generator</h2>
            <input type="text" id="qrInp" placeholder="Enter text or link..." class="w-full bg-black/50 border border-white/10 p-4 rounded-xl mb-6 outline-none">
            <button onclick="genQR()" class="w-full py-4 bg-green-600 rounded-xl font-bold hover:scale-105 transition">GENERATE QR CODE ✅</button>
            <div id="qrBox" class="mt-6 hidden bg-white p-4 rounded-2xl inline-block mx-auto">
                <img id="qrImg" src="" alt="QR">
            </div>
        </div>

    </div>

    <footer class="mt-20 text-center text-gray-700 text-sm">
        <p>100% Secure • No Data Tracking • Made with ❤️ in India 🇮🇳</p>
    </footer>

    <script>
        async function shorten() {
            const longUrl = document.getElementById('longUrl').value;
            const customAlias = document.getElementById('alias').value;
            if(!longUrl) return alert("Bhai, link dalo!");

            const res = await fetch('/api/shorten', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ longUrl, customAlias })
            });
            const data = await res.json();
            document.getElementById('finalUrl').innerText = data.shortUrl;
            document.getElementById('urlResult').classList.remove('hidden');
        }

        function copy() {
            const txt = document.getElementById('finalUrl').innerText;
            navigator.clipboard.writeText(txt);
            alert("Copied!");
        }

        function genQR() {
            const txt = document.getElementById('qrInp').value;
            if(!txt) return alert("Kuch likho!");
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(txt)}`;
            document.getElementById('qrBox').classList.remove('hidden');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART AI-NODE | World's #1 Universal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { background: #050505; color: #f3f4f6; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; }
        #node-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.3; }
        
        /* Custom Dropdown Styling */
        .dropdown-content { display: none; position: absolute; right: 0; top: 50px; background: #0f0f0f; border: 1px solid #333; border-radius: 15px; width: 220px; max-height: 400px; overflow-y: auto; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dropdown-item { display: flex; items-center: center; gap: 12px; padding: 12px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #1a1a1a; }
        .dropdown-item:hover { background: #1a1a1a; }
        .ai-logo { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; }
        
        /* Chat Interface - No Bubbles */
        .chat-container { height: calc(100vh - 140px); overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .chat-row { margin-bottom: 30px; display: flex; flex-direction: column; }
        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }
        .msg-text { max-width: 85%; font-size: 15px; line-height: 1.6; color: #d1d5db; }
        .sender-name { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: #6b7280; }
        
        .input-bar { background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); border-top: 1px solid #222; }
    </style>
</head>
<body>

    <canvas id="node-canvas"></canvas>

    <!-- Header -->
    <header class="fixed top-0 w-full p-4 flex justify-between items-center z-50 border-b border-white/5 bg-black/50 backdrop-blur-md">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
            <span class="font-bold tracking-tighter text-xl">AI<span class="text-blue-500">NODE</span></span>
        </div>

        <!-- THE CUSTOM ARROW DROPDOWN -->
        <div class="relative">
            <button onclick="toggleDropdown()" class="bg-[#111] border border-[#333] px-4 py-2 rounded-full flex items-center gap-3 text-xs font-bold hover:border-blue-500 transition">
                <img id="selected-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg" class="w-4 h-4">
                <span id="selected-name">OPENAI (FAST)</span>
                <i class="fas fa-chevron-down text-[10px] text-blue-500"></i>
            </button>
            <div id="model-list" class="dropdown-content">
                <!-- Models will load here automatically -->
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <main id="chat-box" class="chat-container mt-20 max-w-3xl mx-auto">
        <div class="ai-row chat-row">
            <span class="sender-name text-blue-500">System</span>
            <div class="msg-text">Welcome, Commander. Global nodes synchronized. No API required. Start chatting with any model.</div>
        </div>
    </main>

    <!-- Input Area -->
    <div class="input-bar fixed bottom-0 w-full p-4 md:p-6">
        <div class="max-w-3xl mx-auto flex gap-4">
            <input type="text" id="userInput" placeholder="Message AI Node..." class="flex-1 bg-transparent border border-[#333] p-4 rounded-xl outline-none focus:border-blue-500 text-sm">
            <button onclick="sendMsg()" class="bg-blue-600 text-black px-6 rounded-xl font-bold hover:bg-blue-400 transition">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // --- 1. DYNAMIC MODEL & LOGO FETCHING ---
        const models_api = "https://text.pollinations.ai/models";
        let currentModel = "openai";

        const logos = {
            "openai": "https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg",
            "mistral": "https://avatars.githubusercontent.com/u/144473551?s=200&v=4",
            "llama": "https://upload.wikimedia.org/wikipedia/commons/f/ff/Meta_logo_2021.svg",
            "searchgpt": "https://upload.wikimedia.org/wikipedia/commons/e/e1/Claude_AI_logo.svg",
            "flux": "https://upload.wikimedia.org/wikipedia/commons/1/11/Stable_Diffusion_logo.svg"
        };

        async function loadModels() {
            const list = document.getElementById('model-list');
            try {
                const res = await fetch(models_api);
                const models = await res.json();
                list.innerHTML = ""; // Clear
                
                models.forEach(m => {
                    const logoUrl = logos[m.name.toLowerCase()] || "https://cdn-icons-png.flaticon.com/512/2103/2103633.png";
                    const item = document.createElement('div');
                    item.className = "dropdown-item";
                    item.innerHTML = `<img src="${logoUrl}" class="ai-logo"> <span class="text-xs font-bold uppercase">${m.name}</span>`;
                    item.onclick = () => selectModel(m.name, logoUrl);
                    list.appendChild(item);
                });
            } catch (e) { list.innerHTML = "<div class='p-4 text-xs'>Sync Error</div>"; }
        }

        function toggleDropdown() {
            const d = document.getElementById('model-list');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        function selectModel(name, logo) {
            currentModel = name;
            document.getElementById('selected-name').innerText = name.toUpperCase();
            document.getElementById('selected-logo').src = logo;
            toggleDropdown();
        }

        // --- 2. CLEAN CHAT LOGIC ---
        async function sendMsg() {
            const inp = document.getElementById('userInput');
            const chat = document.getElementById('chat-box');
            if(!inp.value) return;

            const text = inp.value;
            inp.value = "";
            appendRow('User', text, true);

            const aiRow = appendRow(currentModel, "Thinking...", false);

            try {
                const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}?model=${currentModel}`);
                const data = await res.text();
                aiRow.innerText = data;
            } catch (e) { aiRow.innerText = "Connection lost."; }
            chat.scrollTop = chat.scrollHeight;
        }

        function appendRow(sender, text, isUser) {
            const div = document.createElement('div');
            div.className = `chat-row ${isUser ? 'user-row' : 'ai-row'}`;
            div.innerHTML = `<span class="sender-name ${isUser ? 'text-gray-500' : 'text-blue-500'}">${sender}</span><div class="msg-text">${text}</div>`;
            document.getElementById('chat-box').appendChild(div);
            return div.querySelector('.msg-text');
        }

        // --- 3. NODE BACKGROUND ---
        const canvas = document.getElementById('node-canvas');
        const ctx = canvas.getContext('2d');
        let parts = [];
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        class Part {
            constructor() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.vx = Math.random()*0.6-0.3; this.vy = Math.random()*0.6-0.3;
            }
            draw() {
                this.x+=this.vx; this.y+=this.vy;
                if(this.x<0||this.x>canvas.width) this.vx*=-1;
                if(this.y<0||this.y>canvas.height) this.vy*=-1;
                ctx.fillStyle='rgba(59,130,246,0.5)'; ctx.beginPath(); ctx.arc(this.x,this.y,1,0,Math.PI*2); ctx.fill();
            }
        }
        for(let i=0;i<70;i++) parts.push(new Part());
        function anim(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            parts.forEach((p,i)=>{
                p.draw();
                for(let j=i;j<parts.length;j++){
                    let d=Math.hypot(p.x-parts[j].x, p.y-parts[j].y);
                    if(d<120){
                        ctx.strokeStyle=`rgba(59,130,246,${0.2-d/600})`;
                        ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(parts[j].x,parts[j].y);ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(anim);
        }
        anim();
        loadModels();
        window.onclick = (e) => { if(!e.target.closest('.relative')) document.getElementById('model-list').style.display='none'; }
    </script>
</body>
</html>
